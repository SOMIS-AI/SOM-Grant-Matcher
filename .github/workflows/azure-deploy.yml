name: Build and Deploy to Azure Web App

on:
  push:
    branches:
      - main
      - azure
      - dev
  workflow_dispatch:

env:
  IMAGE_NAME: som-grant-matcher
  OWNER: somis-ai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment config
        run: |
          if [ "${{ github.ref_name }}" = "dev" ]; then
            echo "IMAGE_TAG=dev" >> $GITHUB_ENV
            echo "AZURE_WEBAPP_NAME=${{ vars.AZURE_WEBAPP_NAME_DEV }}" >> $GITHUB_ENV
            echo "PUBLISH_PROFILE=${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DEV }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
            echo "AZURE_WEBAPP_NAME=${{ vars.AZURE_WEBAPP_NAME }}" >> $GITHUB_ENV
            echo "PUBLISH_PROFILE=${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" >> $GITHUB_ENV
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ env.PUBLISH_PROFILE }}
          images: ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
